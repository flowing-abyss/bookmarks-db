<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bookmarks DB - Settings</title>
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <div class="settings-container">
      <h1>Settings</h1>

      <div class="settings-section">
        <h2>Appearance</h2>
        <div class="form-group">
          <label for="theme-mode">Theme Palette</label>
          <select id="theme-mode">
            <option value="dark">Base16 Dark</option>
            <option value="light">Base16 Light</option>
            <option value="auto">Follow System</option>
          </select>
        </div>
        <div class="form-group">
          <label>Preview</label>
          <div class="theme-preview" id="theme-preview" aria-hidden="true">
            <span class="theme-preview-chip theme-preview-bg"></span>
            <span class="theme-preview-chip theme-preview-surface"></span>
            <span class="theme-preview-chip theme-preview-focus"></span>
            <span class="theme-preview-chip theme-preview-border"></span>
            <span class="theme-preview-chip theme-preview-text"></span>
          </div>
        </div>
      </div>

      <div class="settings-section">
        <h2>Data Source</h2>
        <div class="form-group">
          <label>Root Folder (display bookmarks from this folder)</label>
          <select id="root-folder">
            <option value="">All Bookmarks</option>
          </select>
        </div>
      </div>

      <div class="settings-section">
        <h2>Behavior</h2>
        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="open-in-new-tab" />
            <span>Open bookmarks in background tab</span>
          </label>
        </div>
        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="close-on-enter-open" />
            <span>Close Bookmarks DB tab after Enter opens a bookmark</span>
          </label>
        </div>
      </div>

      <div class="settings-actions">
        <button class="btn btn-primary" id="save-settings">Save</button>
        <button class="btn btn-secondary" id="reset-settings">Reset to Defaults</button>
      </div>
    </div>
    <script type="module" src="settings.js"></script>
  </body>
</html>
