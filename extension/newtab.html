<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bookmarks DB</title>
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <button class="settings-btn" id="settings-btn" title="Settings" tabindex="-1">⚙️</button>
    <div class="container">
      <header class="header">
        <input
          type="text"
          id="search"
          class="search-input"
          placeholder="Search bookmarks..."
          autocomplete="off"
        />
      </header>
      <main id="bookmarks-list" class="bookmarks-list"></main>
    </div>
    <script type="module" src="app.js"></script>
  </body>
</html>
