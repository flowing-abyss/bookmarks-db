<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bookmarks DB</title>
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <main class="shell">
      <header class="command-bar">
        <div class="command-grid">
          <label class="search-wrap" for="search">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M20 20L15.5 15.5M17 10.5C17 14.0899 14.0899 17 10.5 17C6.91015 17 4 14.0899 4 10.5C4 6.91015 6.91015 4 10.5 4C14.0899 4 17 6.91015 17 10.5Z"
                stroke="currentColor"
                stroke-width="1.6"
                stroke-linecap="round"
              />
            </svg>
            <span class="sr-only">Filter bookmarks</span>
            <input
              type="search"
              id="search"
              class="search-input"
              placeholder="search... site:github.com in:research sort:recent"
              autocomplete="off"
              spellcheck="false"
            />
          </label>

          <label class="select-wrap" for="sort-mode">
            <span class="select-label">sort</span>
            <select id="sort-mode" class="sort-select" aria-label="Sort bookmarks">
              <option value="relevance">relevance</option>
              <option value="recent">recent</option>
              <option value="frequent">opens</option>
              <option value="title">title</option>
              <option value="domain">site</option>
            </select>
          </label>

          <button class="primary-action" type="button" id="new-bookmark-btn">new bookmark</button>
          <button
            class="tool settings-tool"
            type="button"
            id="settings-btn"
            title="Settings"
            tabindex="-1"
          >
            Configure
          </button>
        </div>
        <div class="hotkeys" aria-label="Keyboard shortcuts">
          <span class="hotkey hotkey-stat" id="bookmarks-count">0 rows</span>
          <span class="hotkey hotkey-stat" id="sort-badge">sort: relevance</span>
          <span class="hotkey"><kbd>/</kbd><span>focus</span></span>
          <span class="hotkey"><kbd>⌘J/K</kbd><span>move</span></span>
          <span class="hotkey"><kbd>enter</kbd><span>open</span></span>
          <span class="hotkey"><kbd>⌘↵</kbd><span>bg</span></span>
          <span class="hotkey"><kbd>y</kbd><span>copy</span></span>
          <span class="hotkey"><kbd>n</kbd><span>new</span></span>
          <span class="hotkey"><kbd>⌘E</kbd><span>edit</span></span>
          <span class="hotkey"><kbd>⌘D</kbd><span>del</span></span>
        </div>
      </header>

      <section class="workspace">
        <aside class="folder-rail" aria-label="Folders">
          <div class="folder-rail-head">
            <label class="folder-search-wrap" for="folder-search">
              <span class="sr-only">Filter folders</span>
              <input
                id="folder-search"
                class="folder-search-input"
                type="search"
                spellcheck="false"
                placeholder="Filter folders"
              />
            </label>
          </div>
          <div class="folder-list" id="folder-list"></div>
          <div class="folder-rail-foot">
            <button class="tool folder-add" type="button" id="new-folder-btn">New folder</button>
          </div>
        </aside>

        <section class="table-wrap" id="table-wrap" data-mode="all" aria-label="Bookmarks database">
          <div class="table-head" role="presentation">
            <div class="table-head-grid">
              <span class="column-label header-cell header-cell-title">Title</span>
              <span class="column-label header-cell col-folder">Folder</span>
              <span class="column-label header-cell col-domain">Site</span>
              <span class="column-label header-cell align-right col-last">Last</span>
              <span class="column-label header-cell align-right col-opens">Opens</span>
            </div>
          </div>
          <main id="bookmarks-list" class="rows" role="listbox" aria-label="Bookmarks list"></main>
        </section>
      </section>

      <footer class="status-bar">
        <div class="status-line" id="status-line">Select a row to open or copy.</div>
        <div class="actions">
          <button class="tool" type="button" id="action-open">Open</button>
          <button class="tool" type="button" id="action-background">Open bg</button>
          <button class="tool" type="button" id="action-copy">Copy URL</button>
          <button class="tool" type="button" id="action-edit">Edit</button>
          <button class="tool" type="button" data-variant="danger" id="action-delete">
            Delete
          </button>
        </div>
      </footer>
    </main>
    <p id="selection-url" class="sr-only">No selection</p>
    <p id="selection-path" class="sr-only">Select a row to inspect its path</p>
    <p id="selection-usage" class="sr-only">0 opens</p>
    <p id="selection-feedback" class="sr-only"></p>
    <script type="module" src="app.js"></script>
  </body>
</html>
